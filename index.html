<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>円形タイミング入力</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    color:white;
    font-family:sans-serif;
}

canvas{
    background:#181818;
}

#result{
    position:absolute;
    top:40px;
    font-size:42px;
    font-weight:bold;
}
</style>
</head>
<body>

<div id="result">タップ！</div>
<canvas id="game" width="700" height="700"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const SE = {
    perfect:new Audio(
        "sounds/perfect.mp3"
    ),

    good:new Audio(
        "sounds/good.mp3"
    ),

    miss:new Audio(
        "sounds/miss.mp3"
    ),
};

function playSE(name){

    SE[name].currentTime=0;

    SE[name].play();
}

const result = document.getElementById("result");

const centerX = canvas.width/2;
const centerY = canvas.height/2;
const radius = 220;

// ===== 調整用設定 =====

let SETTINGS = {

    clockwise:true,

    // 1秒あたりの回転角度
    rotationSpeed:360,

    zoneStart:45,

    normalWidth:55,

    perfectWidth:15,

    //入力受付インターバル(ms)
    inputCooldown:250
};

let pointerAngle=0;

let particles=[];

let tapCount = 0;

const MAX_TAPS = 5;

let inputLocked = false;

let lastInputTime = 0;


// =======================

function spawnEffect(type){

    let color="white";

    if(type==="perfect"){
        color="gold";
    }

    if(type==="good"){
        color="lime";
    }

    if(type==="miss"){
        color="red";
    }

    for(let i=0;i<25;i++){

        particles.push({

            x:centerX,
            y:centerY,

            vx:(Math.random()-0.5)*12,

            vy:(Math.random()-0.5)*12,

            life:40,

            color:color
        });
    }
}

function drawParticles(){

    particles.forEach(p=>{

        p.x+=p.vx;
        p.y+=p.vy;

        p.life--;

        ctx.globalAlpha=p.life/40;

        ctx.fillStyle=p.color;

        ctx.beginPath();

        ctx.arc(
            p.x,
            p.y,
            5,
            0,
            Math.PI*2
        );

        ctx.fill();

        ctx.globalAlpha=1;

    });

    particles=
        particles.filter(
            p=>p.life>0
        );
}

function randomizeZone(){

    SETTINGS.zoneStart =
        Math.random()*360;

}


function normalize(a){
    return (a+360)%360;
}

function inRange(angle,start,end){

    angle=normalize(angle);
    start=normalize(start);
    end=normalize(end);

    if(start<=end){
        return angle>=start && angle<=end;
    }

    return angle>=start || angle<=end;
}

function judge(){

    const p = normalize(pointerAngle);

    let perfectStart;
    let perfectEnd;
    let normalEnd;

    if(SETTINGS.clockwise){

        perfectStart = SETTINGS.zoneStart;
        perfectEnd = SETTINGS.zoneStart + SETTINGS.perfectWidth;
        normalEnd = SETTINGS.zoneStart + SETTINGS.normalWidth;

    }else{

        perfectStart = SETTINGS.zoneStart - SETTINGS.perfectWidth;
        perfectEnd = SETTINGS.zoneStart;
        normalEnd = SETTINGS.zoneStart - SETTINGS.normalWidth;

    }

    if(inRange(p,perfectStart,perfectEnd)){

        result.textContent="PERFECT";

        playSE("perfect");

        spawnEffect("perfect");

    }else if(
        inRange(
            p,
            SETTINGS.zoneStart,
            normalEnd
        )
    ){

        result.textContent="GOOD";
        
        playSE("good");

        spawnEffect("good");

    }else{

        result.textContent="MISS";
        
        playSE("miss");

        spawnEffect("miss");
    }
}

function handleInput(){

    if(inputLocked){
        return.textContent = "STOP";
        return;
    }

    tapCount++;

    if(tapCount >= MAX_TAPS){
        inputLocked = true;
    }

    judge();
    randomizeZone();
}


// キーボード
document.addEventListener("keydown",(e)=>{

    if(e.code==="Space"){

        e.preventDefault();

        handleInput();
    }

});


// マウス・スマホ共通入力
document.addEventListener("pointerdown",(e)=>{

    e.preventDefault();

    handleInput();

});

function drawArc(start,width,color,lineWidth=28){

    ctx.beginPath();

    ctx.strokeStyle=color;
    ctx.lineWidth=lineWidth;

    ctx.arc(
        centerX,
        centerY,
        radius,
        (start-90)*Math.PI/180,
        (start+width-90)*Math.PI/180
    );

    ctx.stroke();
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // 外周
    ctx.beginPath();
    ctx.strokeStyle="#444";
    ctx.lineWidth=12;

    ctx.arc(centerX,centerY,radius,0,Math.PI*2);

    ctx.stroke();

    // 判定帯

    if(SETTINGS.clockwise){

        drawArc(SETTINGS.zoneStart,SETTINGS.normalWidth,"#2ecc71");

        drawArc(SETTINGS.zoneStart,SETTINGS.perfectWidth,"#f1c40f",34);

    }else{

        drawArc(SETTINGS.zoneStart-SETTINGS.normalWidth,SETTINGS.normalWidth,"#2ecc71");

        drawArc(SETTINGS.zoneStart-SETTINGS.perfectWidth,SETTINGS.perfectWidth,"#f1c40f",34);

    }

    // ポインター

    const rad=(pointerAngle-90)*Math.PI/180;

    const x=centerX+Math.cos(rad)*radius;
    const y=centerY+Math.sin(rad)*radius;

    ctx.beginPath();

    ctx.strokeStyle="red";
    ctx.lineWidth=6;

    ctx.moveTo(centerX,centerY);
    ctx.lineTo(x,y);

    ctx.stroke();


    drawParticles();
}

let lastTime=performance.now();

function update(now){

    const deltaTime=(now-lastTime)/1000;

    lastTime=now;

    if(SETTINGS.clockwise){

        pointerAngle +=
            SETTINGS.rotationSpeed
            * deltaTime;

    }else{

        pointerAngle -=
            SETTINGS.rotationSpeed
            * deltaTime;
    }

    pointerAngle=normalize(pointerAngle);

    draw();

    requestAnimationFrame(update);
}

requestAnimationFrame(update);

</script>
</body>
</html>
