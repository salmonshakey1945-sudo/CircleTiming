<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>DBD風 修理ゲージ + タイミングイベント</title>

<style>

body{
    margin:0;
    background:#111;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
    font-family:sans-serif;
}

canvas{
    background:#181818;
}

#result{
    position:absolute;
    top:40px;
    left:50%;
    transform:translateX(-50%);

    font-size:42px;
    font-weight:bold;

    text-align:center;
}

#roomSelect{
    text-align:center;
}

#roomInfo{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:24px;
}

.roomRow{
    display:flex;
    align-items:center;
    gap:20px;
    margin:15px 0;
}

.roomBtn{
    width:180px;
    height:60px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:white;
    color:black;

    border:none;

    font-size:28px;

    cursor:pointer;

    transition:.2s;

    box-sizing:border-box;
}

.roomBtn:hover{
    filter:brightness(1.1);
}

.roomBtn.disabled{

    background:#cfcfcf;

    opacity:0.6;

    cursor:not-allowed;

    filter:none;

}

.roomInfo{

    text-align:left;

    font-size:18px;

    min-width:180px;

}

</style>
</head>

<body>

<div id="roomSelect">

    <h1>Room選択</h1>

    <div id="roomList"></div>

</div>

<div id="gameArea" style="display:none;">

    <div id="roomInfo">
    接続中 : -
</div>

    <div id="result"></div>

    <canvas id="game" width="700" height="700"></canvas>

</div>

<script type="module">

    import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue,
    set,
    onDisconnect
}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAK-KCZuRx0UJTkwM8gXzjtK_-7b6pm6R4",
  authDomain: "circletiming-b09f7.firebaseapp.com",
  databaseURL: "https://circletiming-b09f7-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "circletiming-b09f7",
  storageBucket: "circletiming-b09f7.firebasestorage.app",
  messagingSenderId: "998413886850",
  appId: "1:998413886850:web:465720573ba614d6e95b9b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const roomSelect =
    document.getElementById("roomSelect");

const roomList =
    document.getElementById("roomList");

const gameArea =
    document.getElementById("gameArea");

let room = "1";

function createRoomList(rooms){

    roomList.innerHTML="";

    for(let i=1;i<=5;i++){

        const roomName=`room${i}`;

        const room=
            rooms?.[roomName]
            || {};

        const admin=
            room.adminConnected
            ? "使用中"
            : "空き";

        const game=
            room.gameConnected
            ? "使用中"
            : "空き";

        const gameAvailable =
            !room.gameConnected;

        const row=
            document.createElement("div");

        row.className="roomRow";

        const btn=
            document.createElement("button");

        btn.className="roomBtn";

        btn.textContent=roomName;

        if(!gameAvailable){

            btn.disabled=true;

            btn.classList.add(
                "disabled"
            );

        }

        btn.addEventListener(
            "click",
            ()=>{
                selectRoom(roomName);
            }
        );

        const info=
            document.createElement("div");

        info.className="roomInfo";

        info.innerHTML=
            `Admin ${admin}<br>
             Game ${game}`;

        row.appendChild(btn);

        row.appendChild(info);

        roomList.appendChild(row);

    }

}

onValue(
    ref(db,"rooms"),
    snapshot=>{

        createRoomList(
            snapshot.val()
        );

    }
);

let currentRoom=null;

async function selectRoom(roomName){

    try{

        await set(
            ref(
                db,
                `rooms/${roomName}/gameConnected`
            ),
            true
        );

        onDisconnect(
            ref(
                db,
                `rooms/${roomName}/gameConnected`
            )
        ).set(false);

        currentRoom=
            roomName.replace(
                "room",
                ""
            );
            room = currentRoom;

            document.getElementById(
    "roomInfo"
).textContent=
    `接続中 : ${roomName}`;

        roomSelect.style.display="none";

        gameArea.style.display="block";

        onValue(
    ref(
        db,
        `rooms/${roomName}/gameConnected`
    ),
    snapshot=>{

        const connected =
            snapshot.val();

        if(
            connected===false
        ){

            alert(
                "接続が解除されました"
            );

            currentRoom=null;

            roomSelect.style.display=
                "block";

            gameArea.style.display=
                "none";

        }

    }
);

    }
    catch(error){

        alert(
            "接続エラー\n"
            + error.message
        );

    }

}

window.addEventListener(
    "beforeunload",
    ()=>{

        if(!currentRoom) return;

        set(
            ref(
                db,
                `rooms/room${currentRoom}/gameConnected`
            ),
            false
        );

    }
);

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const result=document.getElementById("result");

// ===== 効果音音量 =====

const PERFECT_VOLUME = 1.0;

const GOOD_VOLUME = 1.0;

const MISS_VOLUME = 1.0;

const START_VOLUME = 1.0;

const MAX_VOLUME = 1.0;

const SE={

perfect:new Audio(
    "sounds/perfect.mp3"
),

good:new Audio(
    "sounds/good.mp3"
),

miss:new Audio(
    "sounds/miss.mp3"
),

start:new Audio(
    "sounds/start.mp3"
),

max:new Audio(
    "sounds/max.mp3"
)

};

// 音量設定
SE.perfect.volume=PERFECT_VOLUME;

SE.good.volume=GOOD_VOLUME;

SE.miss.volume=MISS_VOLUME;

SE.start.volume=START_VOLUME;

SE.max.volume=MAX_VOLUME;

function unlockAudio(){

    if(audioUnlocked) return;

    audioUnlocked=true;

}

function startGame(){

    if(gameStarted) return;

    unlockAudio();

    gameStarted=true;

}

function playSE(name){

    SE[name].currentTime=0;
    SE[name].play();

}

const centerX=canvas.width/2;
const centerY=canvas.height/2;
const radius=220;

let SETTINGS={

    clockwise:true,

    rotationSpeed:360,

    zoneStart:45,

    normalWidth:55,

    perfectWidth:15

};

let pointerAngle=0;

let particles=[];

/* =========================
   修理ゲージ設定
========================= */

let repairProgress=0;

const averageFiveEventTime=45;

const repairSpeed=(100*(5/6))/averageFiveEventTime;

const perfectBonus=5;

const missPenalty=5;

const EVENT_INTERVAL_MIN = 2;

const EVENT_INTERVAL_MAX = 6;

/* =========================
   イベント管理
========================= */

let timingActive=false;

let gameFinished=false;

let gameStarted=false;

let electricityActive=false;

let electricityTimer=0;

let resultFreeze=false;

let eventCooldown=0;

let resultTimer=0;

let nextEventTime=randomEventInterval();

let audioUnlocked=false;

let maxSoundPending=false;

let maxSoundFinished=false;

SE.max.addEventListener("ended",()=>{

    maxSoundFinished=true;

});

function randomEventInterval(){

    return EVENT_INTERVAL_MIN
        + Math.random()
        * (
            EVENT_INTERVAL_MAX
            - EVENT_INTERVAL_MIN
        );

}

function randomPointerSpeed(){

    return 180 + Math.random()*360;

}

function startTimingEvent(){

    if(
        timingActive
        || gameFinished
        || electricityActive
        || maxSoundPending
        || repairProgress >= 100
    ) return;

    timingActive=true;

    playSE("start");

    resultFreeze=false;

    result.textContent="";

    pointerAngle=Math.random()*360;

    SETTINGS.zoneStart=Math.random()*360;

    SETTINGS.rotationSpeed=randomPointerSpeed();

}

function endTimingEvent(){

    timingActive=false;

    result.textContent="";

    eventCooldown=1.2;

    nextEventTime=randomEventInterval();

}

function normalize(a){

    return (a+360)%360;

}

function inRange(angle,start,end){

    angle=normalize(angle);
    start=normalize(start);
    end=normalize(end);

    if(start<=end){

        return angle>=start && angle<=end;

    }

    return angle>=start || angle<=end;

}

function spawnEffect(type){

    let color="white";

    if(type==="perfect") color="gold";
    if(type==="good") color="lime";
    if(type==="miss") color="red";

    for(let i=0;i<25;i++){

        particles.push({

            x:centerX,
            y:centerY,

            vx:(Math.random()-0.5)*12,
            vy:(Math.random()-0.5)*12,

            life:40,

            color:color

        });

    }

}

/* =========================
   判定
========================= */

function judge(){

    const p=normalize(pointerAngle);

    let perfectStart;
    let perfectEnd;
    let normalEnd;

    if(SETTINGS.clockwise){

        perfectStart=SETTINGS.zoneStart;
        perfectEnd=SETTINGS.zoneStart+SETTINGS.perfectWidth;
        normalEnd=SETTINGS.zoneStart+SETTINGS.normalWidth;

    }
    else{

        perfectStart=
            SETTINGS.zoneStart
            - SETTINGS.perfectWidth;

        perfectEnd=
            SETTINGS.zoneStart;

        normalEnd=
            SETTINGS.zoneStart
            - SETTINGS.normalWidth;

    }

    if(inRange(p,perfectStart,perfectEnd)){

        result.textContent="PERFECT";

        playSE("perfect");

        spawnEffect("perfect");

        repairProgress+=perfectBonus;

if(repairProgress>=100){

    repairProgress=100;

    timingActive=false;
    resultFreeze=false;
    result.textContent="";

    maxSoundPending=true;
    maxSoundFinished=false;

    playSE("max");

    return;
}

    }
    else if(
        inRange(
            p,
            SETTINGS.zoneStart,
            normalEnd
        )
    ){

        result.textContent="GOOD";

        playSE("good");

        spawnEffect("good");

    }
    else{

        result.textContent="MISS";

        playSE("miss");

        spawnEffect("miss");

        repairProgress-=missPenalty;

        if(repairProgress<0)
            repairProgress=0;

    }

    if(maxSoundPending){
    return;
}

resultFreeze=true;

resultTimer=1;

}

/* =========================
   入力
========================= */

function handleInput(){

    if(!timingActive) return;

    if(resultFreeze) return;

    judge();

}

document.addEventListener("keydown",(e)=>{

    if(e.code==="Space"){

        e.preventDefault();

        if(!gameStarted){

            startGame();

            return;

        }

        handleInput();

    }

});

document.addEventListener(
    "pointerdown",
    (e)=>{

        e.preventDefault();

        if(!gameStarted){

            startGame();

            return;

        }

        handleInput();

});

/* =========================
   描画
========================= */

function drawArc(
    start,
    width,
    color,
    lineWidth=28
){

    ctx.beginPath();

    ctx.strokeStyle=color;

    ctx.lineWidth=lineWidth;

    ctx.arc(
        centerX,
        centerY,
        radius,
        (start-90)*Math.PI/180,
        (start+width-90)*Math.PI/180
    );

    ctx.stroke();

}

function drawParticles(){

    particles.forEach(p=>{

        p.x+=p.vx;
        p.y+=p.vy;

        p.life--;

        ctx.globalAlpha=p.life/40;

        ctx.fillStyle=p.color;

        ctx.beginPath();

        ctx.arc(
            p.x,
            p.y,
            5,
            0,
            Math.PI*2
        );

        ctx.fill();

        ctx.globalAlpha=1;

    });

    particles=
        particles.filter(
            p=>p.life>0
        );

}

function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    /* 修理ゲージ */

    ctx.fillStyle="#333";

    ctx.fillRect(
        100,
        620,
        500,
        28
    );

    ctx.fillStyle="#3498db";

    ctx.fillRect(
        100,
        620,
        500*(repairProgress/100),
        28
    );

    ctx.strokeStyle="#888";

    ctx.lineWidth=3;

    ctx.strokeRect(
        100,
        620,
        500,
        28
    );

    /* イベント時のみ表示 */

    if(timingActive){

        ctx.beginPath();

        ctx.strokeStyle="#444";

        ctx.lineWidth=12;

        ctx.arc(
            centerX,
            centerY,
            radius,
            0,
            Math.PI*2
        );

        ctx.stroke();

        if(SETTINGS.clockwise){

            drawArc(
                SETTINGS.zoneStart,
                SETTINGS.normalWidth,
                "#2ecc71"
            );

            drawArc(
                SETTINGS.zoneStart,
                SETTINGS.perfectWidth,
                "#f1c40f",
                34
            );

        }
        else{

            drawArc(
                SETTINGS.zoneStart
                - SETTINGS.normalWidth,

                SETTINGS.normalWidth,

                "#2ecc71"
            );

            drawArc(
                SETTINGS.zoneStart
                - SETTINGS.perfectWidth,

                SETTINGS.perfectWidth,

                "#f1c40f",

                34
            );

        }

        const rad=
            (pointerAngle-90)
            *Math.PI/180;

        const x=
            centerX
            +Math.cos(rad)*radius;

        const y=
            centerY
            +Math.sin(rad)*radius;

        ctx.beginPath();

        ctx.strokeStyle="red";

        ctx.lineWidth=6;

        ctx.moveTo(
            centerX,
            centerY
        );

        ctx.lineTo(
            x,
            y
        );

        ctx.stroke();

    }

    drawParticles();

    if(electricityActive){

    for(let i=0;i<12;i++){

        ctx.strokeStyle=
            `rgba(
                255,
                230,
                80,
                ${Math.random()}
            )`;

        ctx.lineWidth=4;

        ctx.beginPath();

        let startX=
            Math.random()*canvas.width;

        let startY=
            Math.random()*canvas.height;

        ctx.moveTo(startX,startY);

        for(let j=0;j<6;j++){

            startX+=
                (Math.random()-0.5)*80;

            startY+=
                (Math.random()-0.5)*80;

            ctx.lineTo(startX,startY);

        }

        ctx.stroke();

    }

}

    if(gameFinished){

    ctx.fillStyle="white";

    ctx.font="64px sans-serif";

    ctx.textAlign="center";

    ctx.fillText(
        "終了",
        centerX,
        120
    );

}

if(gameFinished){

    ctx.fillStyle="white";

    ctx.font="64px sans-serif";

    ctx.textAlign="center";

    ctx.fillText(
        "終了",
        centerX,
        120
    );

}


if(!gameStarted){

    ctx.fillStyle="white";

    ctx.font="48px sans-serif";

    ctx.textAlign="center";

    ctx.fillText(
        "タップして開始",
        centerX,
        centerY
    );

}

}

/* =========================
   更新
========================= */

let lastTime=
    performance.now();

let elapsedTime=0;

function update(now){

    const deltaTime=
        (now-lastTime)/1000;

    lastTime=now;

    elapsedTime+=deltaTime;

    /* 通常修理 */

    if(
    gameStarted
    &&
    !gameFinished
    &&
    (
        !timingActive
        ||
        resultFreeze
    )
){

    repairProgress+=
        repairSpeed
        *deltaTime;

   if(
    repairProgress>=100
    &&
    !electricityActive
    &&
    !gameFinished
    &&
    !maxSoundPending
){

    repairProgress=100;

    timingActive=false;
    resultFreeze=false;
    result.textContent="";

    maxSoundPending=true;

    maxSoundFinished=false;

    playSE("max");

}

}

    if(repairProgress>100)
        repairProgress=100;

    /* イベントクールダウン */

    if(eventCooldown>0){

        eventCooldown-=deltaTime;

    }

    /* ランダムイベント */

    /* ランダムイベント */

if(
    gameStarted
    &&
    !timingActive
    &&
    eventCooldown<=0
    &&
    !maxSoundPending
    &&
    repairProgress < 100
){

    nextEventTime-=deltaTime;

    if(nextEventTime<=0){

        startTimingEvent();

    }

}

    /* ポインター回転 */

    if(
        timingActive
        &&
        !resultFreeze
    ){

        if(SETTINGS.clockwise){

            pointerAngle+=
                SETTINGS.rotationSpeed
                *deltaTime;

        }
        else{

            pointerAngle-=
                SETTINGS.rotationSpeed
                *deltaTime;

        }

        pointerAngle=
            normalize(
                pointerAngle
            );

    }

    /* 判定保持1秒 */

    if(resultFreeze){

    resultTimer-=deltaTime;

    if(resultTimer<=0){

        resultFreeze=false;

        endTimingEvent();

    }

}

if(maxSoundPending && maxSoundFinished){

    maxSoundPending=false;

    timingActive=false;

    result.textContent="";

    electricityActive=true;

    electricityTimer=1.5;

}

if(electricityActive){

    electricityTimer-=deltaTime;

    if(electricityTimer<=0){

        electricityActive=false;

        gameFinished=true;

    }

}

    draw();

    function resetGame(){

    repairProgress=0;

    timingActive=false;

    gameFinished=false;

    gameStarted=false;

    electricityActive=false;

    electricityTimer=0;

    resultFreeze=false;

    eventCooldown=0;

    resultTimer=0;

    nextEventTime=randomEventInterval();

    pointerAngle=0;

    particles=[];

    maxSoundPending=false;

    maxSoundFinished=false;

    result.textContent="";

}

onValue(
    ref(db,`room${room}/reset`),
    (snapshot)=>{

        if(snapshot.val()===true){

            resetGame();

            set(
                ref(db,`room${room}/reset`),
                false
            );

        }

    }
);

    requestAnimationFrame(
        update
    );

}

requestAnimationFrame(
    update
);

</script>
</body>
</html>
