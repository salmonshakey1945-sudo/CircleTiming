<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>リセット管理画面</title>

<style>

body{
    background:#111;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

#container{
    text-align:center;
}

button{
    font-size:32px;
    padding:20px 40px;
    cursor:pointer;
}

#status{
    margin-top:20px;
    font-size:24px;
}

#roomSelect{
    text-align:center;
}

#roomInfo{
    font-size:24px;
    margin-bottom:20px;
}

.roomRow{
    display:flex;
    align-items:center;
    gap:20px;
    margin:15px 0;
}

.roomBtn{
    width:180px;
    height:60px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:white;
    color:black;

    border:none;

    font-size:28px;

    cursor:pointer;

    transition:.2s;

    box-sizing:border-box;
}

.roomBtn:hover{
    filter:brightness(1.1);
}

.roomBtn.disabled{

    background:#cfcfcf;

    opacity:0.6;

    cursor:not-allowed;

    filter:none;

}

.roomInfo{

    text-align:left;

    font-size:18px;

    min-width:180px;

}

</style>
</head>
<body>

<div id="roomSelect">

    <h1>Room選択</h1>

    <div id="roomList"></div>

</div>

<div id="container" style="display:none;">

    <div id="roomInfo">
        接続中 : -
    </div>

    <button id="resetBtn">
        リセット
    </button>

    <div id="status"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

import {
    getDatabase,
    ref,
    set,
    onValue,
    onDisconnect
}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js";

let statusTimer;

const firebaseConfig = {

    apiKey: "あなたのapiKey",

    authDomain:
    "circletiming-b09f7.firebaseapp.com",

    databaseURL:
    "https://circletiming-b09f7-default-rtdb.asia-southeast1.firebasedatabase.app",

    projectId:
    "circletiming-b09f7",

    storageBucket:
    "circletiming-b09f7.firebasestorage.app",

    messagingSenderId:
    "998413886850",

    appId:
    "1:998413886850:web:465720573ba614d6e95b9b"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const roomSelect =
    document.getElementById("roomSelect");

const roomList =
    document.getElementById("roomList");

const container =
    document.getElementById("container");

let currentRoom=null;

const status =
    document.getElementById("status");

window.addEventListener(
    "beforeunload",
    ()=>{

        if(!currentRoom) return;

        set(
            ref(
                db,
                `rooms/room${currentRoom}/adminConnected`
            ),
            false
        );

    }
);

function createRoomList(rooms){

    roomList.innerHTML="";

    for(let i=1;i<=5;i++){

        const roomName=`room${i}`;

        const room=
            rooms?.[roomName]
            || {};

        const admin=
            room.adminConnected
            ? "使用中"
            : "空き";

        const game=
            room.gameConnected
            ? "使用中"
            : "空き";

        const adminAvailable =
            !room.adminConnected;

        const row=
            document.createElement("div");

        row.className="roomRow";

        const btn=
            document.createElement("button");

        btn.className="roomBtn";

        btn.textContent=roomName;

        if(!adminAvailable){

            btn.disabled=true;

            btn.classList.add(
                "disabled"
            );

        }

        btn.addEventListener(
            "click",
            ()=>{
                selectRoom(roomName);
            }
        );

        const info=
            document.createElement("div");

        info.className="roomInfo";

        info.innerHTML=
            `Admin ${admin}<br>
             Game ${game}`;

        row.appendChild(btn);

        row.appendChild(info);

        roomList.appendChild(row);

    }

}

onValue(
    ref(db,"rooms"),
    snapshot=>{

        createRoomList(
            snapshot.val()
        );

    }
);

async function selectRoom(roomName){

    try{

        await set(
            ref(
                db,
                `rooms/${roomName}/adminConnected`
            ),
            true
        );

        onDisconnect(
            ref(
                db,
                `rooms/${roomName}/adminConnected`
            )
        ).set(false);

        currentRoom=
            roomName.replace(
                "room",
                ""
            );
            
        document.getElementById(
    "roomInfo"
).textContent=
    `接続中 : ${roomName}`;

        roomSelect.style.display="none";

        container.style.display="block";

    }
    catch(error){

        alert(
            "接続エラー\n"
            + error.message
        );

    }

}

document
.getElementById("resetBtn")
.addEventListener(
    "click",
    async ()=>{

        try{

            await set(
    ref(db,`room${currentRoom}/reset`),
    true
);

        status.textContent =
    "リセット送信完了";

clearTimeout(statusTimer);

statusTimer=setTimeout(()=>{

    status.textContent="";

},2000);

        }
        catch(error){

            status.textContent =
                "エラー: "
                + error.message;

        }

    }
);

</script>

</body>
</html>
